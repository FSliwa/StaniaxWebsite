    <!-- Google tag (gtag.js) - Optimized/Lazy loaded to improve LCP and TBT -->
    <script>
      (function() {
        var initialized = false;
        function initGtag() {
          if (initialized) return;
          initialized = true;
          
          var script = document.createElement('script');
          script.async = true;
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-K4E0LDH848";
          document.head.appendChild(script);
          
          window.dataLayer = window.dataLayer || [];
          function gtag(){window.dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', 'G-K4E0LDH848');
        }
        
        var interactionEvents = ['mouseover', 'keydown', 'touchstart', 'scroll', 'click'];
        function triggerGtag() {
          initGtag();
          interactionEvents.forEach(function(event) {
            window.removeEventListener(event, triggerGtag, { passive: true });
          });
        }
        
        interactionEvents.forEach(function(event) {
          window.addEventListener(event, triggerGtag, { passive: true });
        });
        
        window.addEventListener('load', function() {
          setTimeout(initGtag, 3500);
        });
      })();
    </script>
