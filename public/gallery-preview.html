<!DOCTYPE html>
<html>
<head>
<title>Gallery Preview</title>
<style>
body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.item { position: relative; }
.item img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; border: 2px solid #333; }
.item .label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; }
h1 { text-align: center; margin-bottom: 24px; }
</style>
</head>
<body>
<h1>Galeria - Przegląd wszystkich 20 zdjęć</h1>
<div class="grid">
<script>
for (let i = 1; i <= 20; i++) {
  const num = String(i).padStart(2, '0');
  document.write(`
    <div class="item">
      <img src="/src/assets/gallery/gallery-${num}.jpg" alt="gallery-${num}" />
      <div class="label">gallery-${num}</div>
    </div>
  `);
}
</script>
</div>
</body>
</html>
